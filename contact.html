    <main class="container">
        <section>
            <h1>تماس با من</h1>
            <div class="card">
                <h2>فرم تماس</h2>
                <form action="request-success.html" method="GET">
                    <label for="name">نام:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">ایمیل:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">شماره تماس:</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="project-type">نوع پروژه:</label>
                    <select id="project-type" name="project-type" required>
                        <option value="">انتخاب کنید</option>
                        <option value="logo">طراحی لوگو</option>
                        <option value="banner">طراحی بنر</option>
                        <option value="ui-ux">طراحی UI/UX</option>
                    </select>

                    <label for="description">توضیحات پروژه:</label>
                    <textarea id="description" name="description" rows="4" required></textarea>

                    <button type="submit" class="button">ارسال درخواست</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
